server:
  port: 9090

spring:
  kafka:
    topics:
      onboarding: ${KAFKA_TOPIC_ONBOARDING:onboarding}

    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:notification-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

    listener:
      ack-mode: manual

resend:
  api:
    key: ${RESEND_API_KEY}
  from:
    onboarding: ${RESEND_FROM_ONBOARDING:MindTrack Journal <onboarding@resend.dev>}

eureka:
  instance:
    hostname: ${EUREKA_SERVER_HOST:localhost}
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:root}@${EUREKA_SERVER_HOST:localhost}:8761/eureka/
