server:
  port: 9090

resend:
  api:
    key: ${RESEND_API_KEY}
  from:
    onboarding: ${RESEND_FROM_ONBOARDING:MindTrack Journal <onboarding@mindtrack.dev>}

eureka:
  instance:
    hostname: ${EUREKA_SERVER_HOST:localhost}
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:root}@${EUREKA_SERVER_HOST:localhost}:8761/eureka/
