server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/syedsadiquh/mindtrack-journal
          default-label: main
          search-paths: backend/config-data

        native:
          search-locations: ${CONFIG_DATA_PATH:file:${user.dir}/backend/config-data/}