services:
  postgres:
    image: postgres:17
    container_name: postgres_mindtrack
    environment:
      POSTGRES_DB: mindtrack
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U admin -d mindtrack"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.4
    container_name: redis_mindtrack
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "[ \"$$(redis-cli ping)\" = \"PONG\" ]"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: keycloak_mindtrack
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: root
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_HOSTNAME_URL: http://localhost:8080
      KC_HOSTNAME_STRICT_BACKCHANNEL: "true"
      KC_DB_URL_DATABASE: mindtrack
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: root
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  config-server:
    build: ./config-server
    container_name: config-server
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_DATA_PATH: file:/config-data/
    ports:
      - "8888:8888"
    volumes:
      - ./config-data:/config-data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 35s

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: admin
      EUREKA_PASSWORD: root
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "2000:2000"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/realms/mindtrack-journal
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mindtrack-journal/protocol/openid-connect/certs
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      APP_CORS_ALLOWED_METHODS: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
      APP_CORS_ALLOWED_HEADERS: "*"
      APP_CORS_ALLOW_CREDENTIALS: "true"
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: admin
      EUREKA_PASSWORD: root
    depends_on:
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8083:8083"
    environment:
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: admin
      EUREKA_PASSWORD: root
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/analytics_service
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: admin
      EUREKA_PASSWORD: root
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_service
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  mindtrack-core:
    build: ./core-service
    container_name: mindtrack-core
    ports:
      - "8081:8081"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/realms/mindtrack-journal
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mindtrack-journal/protocol/openid-connect/certs
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: admin
      EUREKA_PASSWORD: root
      SPRING_DATASOURCE_USER_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USER_JDBC_URL: jdbc:postgresql://postgres:5432/user_service
      SPRING_DATASOURCE_USER_USERNAME: admin
      SPRING_DATASOURCE_USER_PASSWORD: root
      SPRING_DATASOURCE_JOURNAL_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_JOURNAL_JDBC_URL: jdbc:postgresql://postgres:5432/journal_service
      SPRING_DATASOURCE_JOURNAL_USERNAME: admin
      SPRING_DATASOURCE_JOURNAL_PASSWORD: root
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: mindtrack-journal
      KEYCLOAK_USER_CLIENT_SECRET: user-service-secret
      ML_SENTIMENT_URL: http://sentiment-analyzer:8000
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      sentiment-analyzer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  sentiment-analyzer:
    build: ../ml/sentiment-analyzer
    container_name: sentiment-analyzer
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: mindtrack-network
    driver: bridge
