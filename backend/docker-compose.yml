services:
  postgres:
    image: postgres:17
    container_name: postgres_mindtrack
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindtrack}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-mindtrack}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.4
    container_name: redis_mindtrack
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "[ \"$$(redis-cli ping)\" = \"PONG\" ]"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: keycloak_mindtrack
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-root}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${POSTGRES_DB:-mindtrack}
      KC_DB_USERNAME: ${POSTGRES_USER:-admin}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-root}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: "${KC_HOSTNAME_STRICT:-false}"
      KC_HTTP_RELATIVE_PATH: ${KC_HTTP_RELATIVE_PATH:-/}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS:-}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '200 OK' <&3" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  kafka:
    image: confluentinc/cp-kafka:8.1.2
    container_name: kafka_mindtrack
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s


  config-server:
    build: ./config-server
    container_name: config-server
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_DATA_PATH: file:/config-data/
    ports:
      - "8888:8888"
    volumes:
      - ./config-data:/config-data:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 35s

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-root}
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://${EUREKA_USERNAME:-admin}:${EUREKA_PASSWORD:-root}@localhost:8761/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "2000:2000"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}/realms/mindtrack-journal
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mindtrack-journal/protocol/openid-connect/certs
      APP_CORS_ALLOWED_ORIGINS: "${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}"
      APP_CORS_ALLOWED_METHODS: "${APP_CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,PATCH,OPTIONS}"
      APP_CORS_ALLOWED_HEADERS: "${APP_CORS_ALLOWED_HEADERS:-*}"
      APP_CORS_ALLOW_CREDENTIALS: "${APP_CORS_ALLOW_CREDENTIALS:-true}"
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-root}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8083:8083"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}/realms/mindtrack-journal
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mindtrack-journal/protocol/openid-connect/certs
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-root}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/analytics_service
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-root}
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}/realms/mindtrack-journal
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mindtrack-journal/protocol/openid-connect/certs
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-root}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_service
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-root}
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "9090:9090"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}/realms/mindtrack-journal
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mindtrack-journal/protocol/openid-connect/certs
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-root}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RESEND_API_KEY: ${RESEND_API_KEY:-some_api_key}
    depends_on:
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  mindtrack-core:
    build: ./core-service
    container_name: mindtrack-core
    ports:
      - "8081:8081"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}/realms/mindtrack-journal
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mindtrack-journal/protocol/openid-connect/certs
      CONFIG_SERVER_HOST: config-server
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-root}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: TRACE
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_USER_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USER_JDBC_URL: jdbc:postgresql://postgres:5432/user_service
      SPRING_DATASOURCE_USER_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_USER_PASSWORD: ${POSTGRES_PASSWORD:-root}
      SPRING_DATASOURCE_JOURNAL_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_JOURNAL_JDBC_URL: jdbc:postgresql://postgres:5432/journal_service
      SPRING_DATASOURCE_JOURNAL_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_JOURNAL_PASSWORD: ${POSTGRES_PASSWORD:-root}
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: mindtrack-journal
      KEYCLOAK_USER_CLIENT_SECRET: ${KEYCLOAK_USER_CLIENT_SECRET:-user-service-secret}
      ML_SENTIMENT_URL: http://sentiment-analyzer:8000
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  sentiment-analyzer:
    build: ../ml/sentiment-analyzer
    container_name: sentiment-analyzer
    ports:
      - "8000:8000"
    environment:
      TRANSFORMERS_OFFLINE: "1"
      MODELS_DIR: /app/models
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_SENTIMENT_REQUEST: journal.page.analysis.request
      KAFKA_TOPIC_SENTIMENT_RESULT: journal.page.analysis.result
      KAFKA_GROUP_ID: sentiment-analyzer
    volumes:
      # Model weights are not baked into the image.
      # Run 'python ml/sentiment-analyzer/download_models.py' once before starting.
      - ../ml/sentiment-analyzer/models:/app/models:ro
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  kafka-data:

networks:
  default:
    name: mindtrack-network
    driver: bridge
